<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Dinner Date</title>
    <style>
        body {
            background: linear-gradient(135deg, #FFE8E5 0%, #FFD6DF 100%);
            margin: 0;
            user-select: none; /* Prevent text selection across the entire body */
        }
        @keyframes heartfade {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }
        .heart {
            z-index: 999;
            animation: heartfade 6s linear;
            position: absolute;
        }
        .heart:before,
        .heart:after {
            content: "";
            background-color: #D94862;
            position: absolute;
            height: 30px;
            width: 45px;
            border-radius: 15px 0px 0px 15px;
        }

        .heart:before {
            transform: rotate(45deg);
        }

        .heart:after {
            left: 10.5px;
            transform: rotate(135deg);
        }

        #brd {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Prevent interaction that can lead to text selection */
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>
</body>

</html>
